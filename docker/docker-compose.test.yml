version: "3.9"

# AI FXDealer — Test environment
#
# Usage:
#   docker compose -f docker/docker-compose.test.yml up -d
#   FXDEALER_DB_URL=postgresql://fxdealer:fxdealer_test@localhost:5433/fxdealer_test \
#   FXDEALER_REDIS_URL=redis://localhost:6380/0 \
#   pytest
#
# Runs on different ports (5433, 6380) to avoid conflicts with local dev stack.

services:

  db-test:
    image: timescale/timescaledb:latest-pg16
    container_name: fxdealer-db-test
    restart: unless-stopped
    environment:
      POSTGRES_DB: fxdealer_test
      POSTGRES_USER: fxdealer
      POSTGRES_PASSWORD: fxdealer_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data    # in-memory — fast, disposable
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fxdealer -d fxdealer_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-test:
    image: redis:7-alpine
    container_name: fxdealer-redis-test
    restart: unless-stopped
    ports:
      - "6380:6379"
    tmpfs:
      - /data    # in-memory — fast, disposable
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

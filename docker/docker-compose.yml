version: "3.9"

# AI FXDealer — Full stack local dev
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#   docker compose -f docker/docker-compose.yml exec db psql -U fxdealer fxdealer
#
# Run migrations after first start:
#   FXDEALER_DB_URL=postgresql://fxdealer:fxdealer@localhost:5432/fxdealer \
#   uv run --package db alembic -c packages/db/alembic.ini upgrade head

services:

  # ── PostgreSQL + TimescaleDB ───────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: fxdealer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fxdealer
      POSTGRES_USER: fxdealer
      POSTGRES_PASSWORD: fxdealer
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fxdealer -d fxdealer"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fxdealer-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Alembic migration runner (one-shot) ────────────────────────────────────
  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.migrate
    container_name: fxdealer-migrate
    environment:
      FXDEALER_DB_URL: postgresql://fxdealer:fxdealer@db:5432/fxdealer
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── ARQ collector worker (Linux collectors only) ───────────────────────────
  # Note: MT5 and MT4 collectors require Windows hosts — start them separately
  # on Windows EC2 or Windows Docker containers with the DLL/SDK available.
  collector-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.collector
    container_name: fxdealer-collector-worker
    restart: unless-stopped
    environment:
      FXDEALER_DB_URL: postgresql://fxdealer:fxdealer@db:5432/fxdealer
      FXDEALER_REDIS_URL: redis://redis:6379/0
      FXDEALER_LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      arq queue.workers.collector_worker.WorkerSettings

volumes:
  db_data:
  redis_data:

[project]
name = "db"
version = "0.1.0"
requires-python = ">=3.11"

dependencies = [
    "sqlalchemy>=2.0",
    "psycopg2-binary>=2.9",
    "alembic>=1.13",
    "structlog>=24.0",
    "shared",
]

[tool.uv.sources]
shared = { path = "../shared" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

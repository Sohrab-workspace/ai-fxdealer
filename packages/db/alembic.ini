# Alembic configuration for ai-fxdealer packages/db
#
# The database URL is NOT set here — it is injected at runtime from the
# FXDEALER_DB_URL environment variable via env.py.
# Never hardcode credentials in this file.

[alembic]
script_location = migrations

# Uncomment to enable file-based migration output
# output_encoding = utf-8

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
